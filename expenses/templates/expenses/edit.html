{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center mt-4">
    <div class="col-sm-10 col-md-8 col-lg-6">

        <div class="mb-4">
            <a href="{% url 'dashboard' %}" class="text-muted text-decoration-none" style="font-size:0.875rem;">
                <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
            </a>
        </div>

        <div class="text-center mb-4">
            <div
                style="width:56px;height:56px;background:linear-gradient(135deg,#f77f00,#d62828);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;">
                <i class="bi bi-pencil text-white fs-4"></i>
            </div>
            <h2 class="mt-3 fw-bold" style="color:#1a1f36;">Edit Expense</h2>
            <p class="text-muted" style="font-size:0.9rem;">Update the details of this expense</p>
        </div>

        <div class="card">
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    <div class="row g-3">

                        <div class="col-12">
                            <label class="form-label">Title</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0">
                                    <i class="bi bi-pencil text-muted"></i>
                                </span>
                                <input type="text" name="title" class="form-control border-start-0 ps-0"
                                    value="{{ form.instance.title }}" placeholder="e.g. Grocery shopping" required>
                            </div>
                        </div>

                        <div class="col-sm-6">
                            <label class="form-label">Amount (₹)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white">
                                    <i class="bi bi-currency-rupee text-muted"></i>
                                </span>
                                <input type="number" name="amount" class="form-control"
                                    value="{{ form.instance.amount }}" placeholder="0.00" min="0" step="0.01" required>
                            </div>
                        </div>

                        <div class="col-sm-6">
                            <label class="form-label">Date</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0">
                                    <i class="bi bi-calendar text-muted"></i>
                                </span>
                                <input type="date" name="date" class="form-control border-start-0 ps-0"
                                    value="{{ form.instance.date|date:'Y-m-d' }}" required>
                            </div>
                        </div>

                        <div class="col-12">
                            <label class="form-label">Category <span class="text-muted"
                                    style="font-size:0.8rem;">(optional)</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0">
                                    <i class="bi bi-tag text-muted"></i>
                                </span>
                                <select name="category" class="form-select border-start-0">
                                    <option value="">— No Category —</option>
                                    {% for cat in form.category.field.queryset %}
                                    <option value="{{ cat.pk }}" {% if form.instance.category.pk==cat.pk %}selected{%
                                        endif %}>
                                        {{ cat.name }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="col-12">
                            <label class="form-label">Notes <span class="text-muted"
                                    style="font-size:0.8rem;">(optional)</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0">
                                    <i class="bi bi-chat-left-text text-muted"></i>
                                </span>
                                <textarea name="notes" class="form-control border-start-0 ps-0" rows="3"
                                    placeholder="Any additional notes...">{{ form.instance.notes }}</textarea>
                            </div>
                        </div>

                        <div class="col-12 d-grid gap-2 mt-2">
                            <button type="submit" class="btn btn-primary py-2">
                                <i class="bi bi-check-lg me-2"></i>Save Changes
                            </button>
                            <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg me-2"></i>Cancel
                            </a>
                        </div>

                    </div>
                </form>
            </div>
        </div>

    </div>
</div>

{% endblock %}

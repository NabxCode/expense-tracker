<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', sans-serif;
        }
        .navbar {
            background-color: #1a1f36;
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.3rem;
            color: #fff !important;
            letter-spacing: 0.5px;
        }
        .nav-link {
            color: #cdd5e0 !important;
            font-size: 0.9rem;
        }
        .nav-link:hover {
            color: #fff !important;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
        }
        .card-header {
            background-color: #fff;
            border-bottom: 1px solid #f0f2f5;
            font-weight: 600;
            border-radius: 12px 12px 0 0 !important;
            padding: 1rem 1.25rem;
        }
        .table thead th {
            background-color: #1a1f36;
            color: #fff;
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: none;
        }
        .table tbody tr:hover {
            background-color: #f8f9ff;
        }
        .table td, .table th {
            vertical-align: middle;
            padding: 0.85rem 1rem;
        }
        .btn-primary {
            background-color: #4361ee;
            border-color: #4361ee;
        }
        .btn-primary:hover {
            background-color: #3451d1;
            border-color: #3451d1;
        }
        .btn-outline-secondary {
            font-size: 0.875rem;
        }
        .stat-card {
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            color: #fff;
            border: none;
        }
        .stat-card .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            opacity: 0.85;
        }
        .stat-card .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 0.25rem;
        }
        .badge-category {
            background-color: #eef0ff;
            color: #4361ee;
            font-weight: 500;
            font-size: 0.78rem;
            padding: 0.35em 0.75em;
            border-radius: 20px;
        }
        .alert-budget {
            background-color: #fff3cd;
            border-left: 4px solid #ffc107;
            border-radius: 8px;
            color: #7d5a00;
        }
        .alert-budget-danger {
            background-color: #fde8e8;
            border-left: 4px solid #e74c3c;
            border-radius: 8px;
            color: #7d1a1a;
        }
        .form-control, .form-select {
            border-radius: 8px;
            border: 1px solid #dde1f0;
            font-size: 0.92rem;
        }
        .form-control:focus, .form-select:focus {
            border-color: #4361ee;
            box-shadow: 0 0 0 0.2rem rgba(67,97,238,0.15);
        }
        .form-label {
            font-size: 0.875rem;
            font-weight: 500;
            color: #444;
        }
        .page-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1a1f36;
        }
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #aaa;
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="{% url 'dashboard' %}">
            <i class="bi bi-wallet2 me-2"></i>ExpenseTracker
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center gap-2">
                {% if user.is_authenticated %}
                <li class="nav-item">
                    <span class="nav-link">
                        <i class="bi bi-person-circle me-1"></i>{{ user.username }}
                    </span>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'manage_categories' %}">
                        <i class="bi bi-tags me-1"></i>Categories
                    </a>
                </li>
                <li class="nav-item">
                    <a class="btn btn-sm btn-outline-light" href="{% url 'logout' %}">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </a>
                </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>

<div class="container py-4">
    {% block content %}{% endblock %}
</div>

<footer class="text-center py-4 mt-2" style="background-color:#1a1f36; color:#8892a4; font-size:0.85rem;">
    <div class="container">
        <span>&copy; 2026 <strong style="color:#fff;">NabeelAhmedKhan</strong>. All rights reserved.</span>
        <br>
        <span style="font-size:0.78rem; opacity:0.6;">Built with Django &amp; MySQL</span>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

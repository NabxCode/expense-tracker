{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-sm-8 col-md-6 col-lg-4">

        <div class="text-center mb-4">
            <div
                style="width:56px;height:56px;background:linear-gradient(135deg,#4361ee,#3a0ca3);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;">
                <i class="bi bi-wallet2 text-white fs-4"></i>
            </div>
            <h2 class="mt-3 fw-bold" style="color:#1a1f36;">Welcome back</h2>
            <p class="text-muted" style="font-size:0.9rem;">Sign in to your account</p>
        </div>

        <div class="card">
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0">
                                <i class="bi bi-person text-muted"></i>
                            </span>
                            <input type="text" name="username" class="form-control border-start-0 ps-0"
                                placeholder="Enter your username" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0">
                                <i class="bi bi-lock text-muted"></i>
                            </span>
                            <input type="password" name="password" class="form-control border-start-0 ps-0"
                                placeholder="Enter your password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>
                </form>
            </div>
        </div>

        <p class="text-center text-muted mt-3" style="font-size:0.875rem;">
            Don't have an account?
            <a href="{% url 'register' %}" class="text-primary fw-semibold text-decoration-none">Register</a>
        </p>

    </div>
</div>

{% endblock %}
